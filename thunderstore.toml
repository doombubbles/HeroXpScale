[package]
name = "HeroXpScale"
namespace = "doombubbles"
description = "Lets you configure the XP Scales for BTD6 Heroes"
websiteUrl = "https://github.com/doombubbles/HeroXpScale"

[package.dependencies]
LavaGang-MelonLoader = "0.7.3"
doombubbles-Btd6ModHelper = "3.6.5"

[build]
icon = "./Icon.png"
readme = "./README.md"
outdir = "bin"

[[build.copy]]
source = "./bin/Release/HeroXpScale.dll"
target = "HeroXpScale.dll"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = ["bloons-td-6"]
categories = ["mods"]
