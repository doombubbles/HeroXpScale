# This workflow file is automatically updated by Mod Helper via btd6.targets using info from your project and ModHelperData
# If you don't want a GitHub actions workflow, you can delete this file and it won't be regenerated
# If you want Mod Helper to not overwrite any manual changes to this file, set <GenerateActionsWorkflow>false</GenerateActionsWorkflow>
name: Build

on:
  push:
    branches:
      - '*'
    tags:
      - '*'

env:
  PROJECT_NAME: HeroXpScale
  DLL_NAME: HeroXpScale.dll

  BLOONSTD6: ./BloonsTD6
  MOD_HELPER_NAME: Btd6ModHelper
  MOD_HELPER_REPO: gurrenm3/BTD-Mod-Helper

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repo
        uses: actions/checkout@master
        with:
          path: ${{ env.PROJECT_NAME }}


      - name: Download Latest MelonLoader
        if: env.MELONLOADER_BRANCH == ''
        uses: robinraju/release-downloader@v1.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: LavaGang/MelonLoader
          fileName: MelonLoader.x64.zip
          tarBall: false
          zipBall: false
          latest: true
      - name: Extract Latest MelonLoader
        if: env.MELONLOADER_BRANCH == ''
        shell: bash
        run: unzip MelonLoader.x64.zip -d ${{ env.BLOONSTD6 }}


      - name: Download Specific MelonLoader
        if: env.MELONLOADER_BRANCH != ''
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          branch: ${{ env.MELONLOADER_BRANCH }}
          name: MelonLoader.Linux.x64.CI.Release
          repo: LavaGang/MelonLoader
          path: ${{ env.BLOONSTD6 }}


      - name: Clone Dependencies Repo
        uses: actions/checkout@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: doombubbles/btd6-ci-dependencies
          ref: main
          path: ${{ env.BLOONSTD6 }}/MelonLoader/Il2CppAssemblies


      - name: Download Latest Mod Helper
        uses: robinraju/release-downloader@v1.4
        if: env.MOD_HELPER_BRANCH == ''
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ env.MOD_HELPER_REPO }}
          fileName: ${{ env.MOD_HELPER_NAME }}.dll
          out-file-path: ${{ env.BLOONSTD6 }}/Mods/
          latest: true


      - name: Download Specific Mod Helper
        uses: dawidd6/action-download-artifact@v6
        if: env.MOD_HELPER_BRANCH != ''
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          name: ${{ env.MOD_HELPER_NAME }}.dll
          branch: ${{ env.MOD_HELPER_BRANCH }}
          repo: ${{ env.MOD_HELPER_REPO }}
          path: ${{ env.BLOONSTD6 }}/Mods/


      - name: Download btd6.targets
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            choco install -y wget
          fi
          wget https://raw.githubusercontent.com/${{ env.MOD_HELPER_REPO }}/master/BloonsTD6%20Mod%20Helper/btd6.targets


      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build -c Release -p:BloonsTD6="../${{ env.BLOONSTD6 }}" "${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj"

      - name: Upload Mod DLL
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DLL_NAME }}
          path: ${{ env.BLOONSTD6 }}/Mods/${{ env.DLL_NAME }}


      - name: Changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/') && hashFiles(format('{0}/CHANGELOG.md', env.PROJECT_NAME)) != '' && hashFiles(format('{0}/LATEST.md', env.PROJECT_NAME)) == ''
        uses: mindsers/changelog-reader-action@v2.4.0
        with:
          version: ${{ github.ref_name }}
          path: ${{ env.PROJECT_NAME }}/CHANGELOG.md

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.BLOONSTD6 }}/Mods/${{ env.DLL_NAME }}
          body_path: ${{ hashFiles(format('{0}/LATEST.md', env.PROJECT_NAME)) != '' && format('{0}/LATEST.md', env.PROJECT_NAME) || '' }}
          body: ${{ steps.changelog.outputs.changes }}
          generate_release_notes: ${{ hashFiles(format('{0}/LATEST.md', env.PROJECT_NAME)) == '' && hashFiles(format('{0}/CHANGELOG.md', env.PROJECT_NAME)) == '' }}
          fail_on_unmatched_files: true
          draft: ${{ env.ACT == 'true' }}
